<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema claro/oscuro">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">-</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden" data-mode="start">
      <div class="overlay-box">
        <p id="overlay-title">TETRIS</p>
        <p id="overlay-score"></p>

        <div id="overlay-records">
          <div id="name-entry" class="hidden">
            <label for="name-input">¡Nuevo récord! Introduce tu nombre:</label>
            <div class="name-entry-row">
              <input id="name-input" type="text" maxlength="10" placeholder="ANÓN" autocomplete="off" />
              <button id="save-name-btn">Guardar</button>
            </div>
          </div>

          <ol id="records-list" class="records-list"></ol>

          <div class="overlay-stats">
            <div class="panel-section">
              <span class="label">MEJOR COMBO</span>
              <span class="value" id="best-combo">0</span>
            </div>
            <div class="panel-section">
              <span class="label">MÁX LÍNEAS</span>
              <span class="value" id="max-lines">0</span>
            </div>
          </div>
        </div>

        <button id="restart-btn">Jugar</button>
        <button id="reset-records-btn">Resetear récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
