<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema claro/oscuro">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="highscore-entry" class="hidden">
          <p>¡Nuevo récord! Introduce tu nombre:</p>
          <input id="highscore-name-input" type="text" maxlength="12" placeholder="Jugador" autocomplete="off" />
          <button id="highscore-submit-btn">Guardar</button>
        </div>
        <div id="overlay-highscores-section" class="highscores-section hidden">
          <span class="label">RECORDS</span>
          <table id="overlay-highscores-table" class="highscores-table">
            <tbody></tbody>
          </table>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box start-box">
        <p class="start-title">TETRIS</p>
        <div class="highscores-section">
          <span class="label">RECORDS</span>
          <table id="start-highscores-table" class="highscores-table">
            <tbody></tbody>
          </table>
        </div>
        <div class="stats-section">
          <div class="stat">
            <span class="label">MEJOR COMBO</span>
            <span class="value" id="start-best-combo">0</span>
          </div>
          <div class="stat">
            <span class="label">MÁS LÍNEAS</span>
            <span class="value" id="start-max-lines">0</span>
          </div>
        </div>
        <div class="start-actions">
          <button id="reset-scores-btn">Reset records</button>
          <button id="play-btn">Jugar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
