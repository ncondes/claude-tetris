<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema claro/oscuro">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select" class="skin-select" aria-label="Elegir skin visual">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel</option>
          </select>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="overlay-box pause-box">
        <p id="pause-title">PAUSA</p>

        <div class="pause-menu-actions">
          <button id="resume-btn" type="button" class="pause-btn">Reanudar</button>
          <button id="pause-restart-btn" type="button" class="pause-btn">Reiniciar</button>
          <button id="toggle-controls-btn" type="button" class="pause-btn">Ver controles</button>
        </div>

        <ul id="pause-controls-list" class="pause-controls-list hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd> pausa</li>
          <li><kbd>Esc</kbd> pausa</li>
        </ul>

        <div class="pause-level-select">
          <label for="start-level-select">Nivel inicial</label>
          <select id="start-level-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
