<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema claro/oscuro">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn" class="menu-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="overlay-box">
        <p class="menu-title">PAUSA</p>

        <button id="resume-btn" class="menu-btn">Reanudar</button>
        <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>

        <div class="level-stepper">
          <span class="label">NIVEL INICIAL</span>
          <div class="stepper-row">
            <button id="level-down" class="stepper-btn" aria-label="Bajar nivel inicial">−</button>
            <span id="start-level-value" class="stepper-value">1</span>
            <button id="level-up" class="stepper-btn" aria-label="Subir nivel inicial">+</button>
          </div>
        </div>

        <button id="controls-toggle" class="menu-btn menu-btn-ghost"
                aria-expanded="false" aria-controls="pause-controls">Ver controles</button>
        <ul id="pause-controls" class="pause-controls hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
